<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tent — EC & Water Monitor</title>
    <meta name="theme-color" content="#0a0f0d">
    <link rel="stylesheet" href="styles.css?v=1.4">
    <link rel="stylesheet" href="stats.css?v=1.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
                        <span class="logo-icon">💧</span>
                        <h1>EC & Water</h1>
                    </a>
                </div>
                <div class="header-right">
                    <a href="/" class="settings-indicator" title="Dashboard" style="text-decoration: none;">🌱</a>
                </div>
            </div>
        </header>

        <main class="dashboard" style="margin-top: 2rem;">
            <!-- Current Status Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">⚡</div>
                    <div class="card-title">
                        <h2>Current Status</h2>
                        <span class="device-type">Attic Greenhouse ESP32</span>
                    </div>
                    <div class="status-badge" id="statusBadgeContainer">
                        <span class="badge offline" id="statusBadge">Checking...</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="metric-grid">
                        <div class="metric metric-large">
                            <span class="metric-label">EC</span>
                            <span class="metric-value"><span id="ecValue">--</span> <span style="font-size: 0.5em; opacity: 0.7;">µS/cm</span></span>
                        </div>
                        <div class="metric metric-large">
                            <span class="metric-label">Water Tank</span>
                            <span class="metric-value" id="waterValue">--</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Raw ADC</span>
                            <span class="metric-value" id="adcValue">--</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">K-Factor</span>
                            <span class="metric-value" id="kfactorValue">--</span>
                        </div>
                    </div>
                </div>
                <div class="card-error" id="ecError" style="display: none;"></div>
            </div>

            <!-- Graph Card -->
            <div class="card stats-card col-span-full" style="margin-top: 1rem;">
                <div class="card-header" style="justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="card-icon">📈</div>
                        <div class="card-title">
                            <h2>Historic EC Measurements</h2>
                            <span class="device-type" id="graphSubtitle">Last 7 Days</span>
                        </div>
                    </div>
                    <div class="period-selector" style="margin-bottom: 0;">
                        <button class="period-btn" data-hours="24">1D</button>
                        <button class="period-btn" data-hours="48">2D</button>
                        <button class="period-btn" data-hours="72">3D</button>
                        <button class="period-btn active" data-hours="168">7D</button>
                        <button class="period-btn" data-hours="720">30D</button>
                    </div>
                </div>
                <div class="chart-container" style="height: 300px; padding: 1rem;">
                    <canvas id="ecChart"></canvas>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="card" style="margin-top: 1rem;">
                <div class="card-header">
                    <div class="card-icon">⚙️</div>
                    <div class="card-title">
                        <h2>Calibration</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div style="display: flex; gap: 1rem; align-items: flex-end;">
                        <label class="setting-item" style="flex: 1; border: none; padding: 0;">
                            <span style="display: block; margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.85rem;">New K-Factor</span>
                            <input type="number" id="newKFactorInput" value="1.9" step="0.01" style="width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; padding: 0.75rem; border-radius: 8px;">
                        </label>
                        <button id="btnChangeKFactor" class="btn-primary" style="padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #4ade80; color: #0a0f0d; font-weight: 600; cursor: pointer;">Save</button>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- PIN Modal -->
        <div id="pinModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
            <div class="modal-content" style="background: #111827; padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1);">
                <h3 style="margin-top: 0; margin-bottom: 1rem; color: #f3f4f6;">🔐 Enter PIN</h3>
                <p style="color: #9ca3af; margin-bottom: 1.5rem; font-size: 0.9rem;">Enter your 4-digit code to change calibration.</p>
                <input type="password" id="pinInput" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="••••" style="width: 100%; font-size: 2rem; text-align: center; letter-spacing: 0.5em; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem;">
                <div id="pinError" style="display: none; color: #f87171; font-size: 0.85rem; margin-bottom: 1rem; text-align: center;">Invalid PIN</div>
                <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button id="btnPinCancel" style="flex: 1; padding: 0.75rem; background: rgba(255,255,255,0.05); color: white; border: none; border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button id="btnPinSubmit" style="flex: 1; padding: 0.75rem; background: #4ade80; color: #0a0f0d; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Confirm</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p><a href="/" style="color: inherit; text-decoration: none; opacity: 0.7;">← Back to Dashboard</a></p>
        </footer>
    </div>
    <script src="ec.js?v=1.2"></script>
</body>
</html>
